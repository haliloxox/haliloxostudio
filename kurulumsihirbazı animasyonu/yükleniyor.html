<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HalilOXO - Ultimate Loading Edition</title>
    <style>
        :root {
            --bg-color: transparent;
            --logo-color: #ffffff;
            --animation-speed: 4s;
        }

        body.theme-black { --bg-color: transparent; }
        body.theme-transparent { --bg-color: transparent; }
        body.theme-green { --bg-color: transparent; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.4s ease;
            position: relative;
        }

        /* --- MATRIX CANVAS --- */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Ön Plan İçerik Alanı */
        .content-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- ÜST KISIM: DINAMIK METIN GRUBU --- */
        .header-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .title-container {
            font-size: 42px;
            font-weight: bold;
            color: var(--logo-color);
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* Karakter Döngüsü */
        .morphing-text::after {
            content: "halilox□▴";
            animation: textSequence 6s steps(5, end) infinite;
        }

        @keyframes textSequence {
            0%   { content: "halilox□▴"; }
            20%  { content: "halil▴ox□"; }
            40%  { content: "halil□▴ox"; }
            60%  { content: "halilx□▴o"; }
            80%  { content: "halilox□▴"; }
            100% { content: "halilox□▴"; }
        }

        /* YÜKLENİYOR... METNİ VE ANİMASYONU */
        .loading-text {
            font-size: 16px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .loading-text::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20%   { content: ""; }
            40%       { content: "."; }
            60%       { content: ".."; }
            80%, 100% { content: "..."; }
        }

        /* --- ORTA KISIM: 60 FPS SONSUZLUK LOGOSU --- */
        .oxo-stage {
            position: relative;
            width: 450px;
            height: 200px;
        }

        .oxo-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.6));
        }

        .fixed-o {
            fill: none;
            stroke: var(--logo-color);
            stroke-width: 16;
            opacity: 0.15;
        }

        .moving-bar {
            fill: none;
            stroke: var(--logo-color);
            stroke-width: 16;
            stroke-linecap: round;
            stroke-dasharray: 150 850; 
            will-change: stroke-dashoffset;
        }

        .bar-lead { animation: travelInfinity var(--animation-speed) linear infinite; }
        .bar-follow { 
            animation: travelInfinity var(--animation-speed) linear infinite; 
            animation-delay: calc(var(--animation-speed) / -2);
        }

        @keyframes travelInfinity {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -1000; }
        }

        /* TEMA BUTONLARI */
        .theme-switcher {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 10; opacity: 0.3; transition: 0.3s;
        }
        .theme-switcher:hover { opacity: 1; }
        .theme-btn {
            padding: 8px 14px; border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px; background: transparent; color: #fff; cursor: pointer; font-size: 12px;
        }
        .theme-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
    </style>
</head>
<body class="theme-transparent">

    <canvas id="matrix-canvas"></canvas>

    <div class="theme-switcher">
        <button class="theme-btn" onclick="changeTheme('black')">Siyah</button>
        <button class="theme-btn" onclick="changeTheme('green')">Yeşil</button>
        <button class="theme-btn" onclick="changeTheme('transparent')">Şeffaf</button>
    </div>

    <div class="content-container">
        <div class="header-group">
            <div class="title-container">
                <span class="morphing-text"></span>
            </div>
            <div class="loading-text">Yükleniyor</div>
        </div>

        <div class="oxo-stage">
            <svg class="oxo-svg" viewBox="0 0 450 200" xmlns="http://www.w3.org/2000/svg">
                <circle class="fixed-o" cx="110" cy="100" r="52" />
                <circle class="fixed-o" cx="340" cy="100" r="52" />

                <path class="moving-bar bar-lead" pathLength="1000"
                      d="M 225,100 C 285,30 405,30 405,100 C 405,170 285,170 225,100 C 165,30 45,30 45,100 C 45,170 165,170 225,100 Z" />

                <path class="moving-bar bar-follow" pathLength="1000"
                      d="M 225,100 C 285,30 405,30 405,100 C 405,170 285,170 225,100 C 165,30 45,30 45,100 C 45,170 165,170 225,100 Z" />
            </svg>
        </div>
    </div>

    <script>
        function changeTheme(themeName) {
            document.body.className = '';
            document.body.classList.add('theme-' + themeName);
        }

        // Matrix Yağmuru
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = "01OXOX□▴■▵".split("");
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillStyle = Math.random() > 0.98 ? '#ffffff' : 'rgba(255, 255, 255, 0.15)';
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);
    </script>
</body>
</html>
